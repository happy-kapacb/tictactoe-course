name: TicTacToe CI
on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DBUILD_TTTCORE=FULL
          make
      - name: Run tests
        run: cd build && ctest --output-on-failure